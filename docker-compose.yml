services:
  mask2former-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HF_REPO_ID=srnortw/mask2former-lane-seg
      - HF_TOKEN=${HF_TOKEN:-}
      - MODEL_FILE=mask2former_int8.onnx
      - IMG_SIZE=512
      - CONF_THRESH=0.5
      # MongoDB Atlas project: mask2former-mlops | cluster: mask2former-cluster
      - MONGO_URI=${MONGO_URI:-}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-mask2former}
      - MONGO_COLLECTION_PREDICTIONS=${MONGO_COLLECTION_PREDICTIONS:-predictions}
      - MONGO_COLLECTION_DRIFT=${MONGO_COLLECTION_DRIFT:-drift_reports}
      # Optional: skip HF download if file is mounted
      # - LOCAL_ONNX_PATH=/models/mask2former_int8.onnx
    restart: unless-stopped
